<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
    <!-- Background Gradient -->
    <defs>
        <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#004E93;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0066CC;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:rgba(255,255,255,0.1);stop-opacity:1" />
            <stop offset="100%" style="stop-color:rgba(255,255,255,0.05);stop-opacity:1" />
        </linearGradient>
    </defs>

    <!-- Background -->
    <rect width="1200" height="630" fill="url(#bgGradient)" />

    <!-- Decorative Elements -->
    <circle cx="100" cy="100" r="40" fill="rgba(255,255,255,0.1)" />
    <circle cx="1100" cy="530" r="60" fill="rgba(255,255,255,0.08)" />
    <circle cx="200" cy="500" r="25" fill="rgba(255,255,255,0.12)" />

    <!-- Main Card -->
    <rect x="80" y="120" width="1040" height="390" rx="20" fill="url(#cardGradient)" stroke="rgba(255,255,255,0.2)" stroke-width="1" />

    <!-- Content Container -->
    <g transform="translate(120, 160)">
        <!-- Profile Icon -->
        <circle cx="80" cy="80" r="60" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)"
            stroke-width="2" />
        <circle cx="80" cy="65" r="25" fill="rgba(255,255,255,0.4)" />
        <path d="M45 105 Q45 95 55 95 L105 95 Q115 95 115 105 L115 110 Q115 120 105 120 L55 120 Q45 120 45 110 Z"
            fill="rgba(255,255,255,0.4)" />

        <!-- Main Text -->
        <text x="180" y="50" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="white">Math Rorpheeyah
        </text>
        <text x="180" y="85" font-family="Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.9)">Senior Android Developer
        </text>
        <text x="180" y="115" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.8)">Sub-Leader Mobile Department • KOSIGN
        </text>

        <!-- Skills Tags -->
        <g transform="translate(180, 140)">
            <rect x="0" y="0" width="80" height="30" rx="15" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
            <text x="40" y="20" font-family="Arial, sans-serif" font-size="14" text-anchor="middle"
                fill="white">Kotlin
            </text>

            <rect x="90" y="0" width="70" height="30" rx="15" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
            <text x="125" y="20" font-family="Arial, sans-serif" font-size="14" text-anchor="middle"
                fill="white">Java
            </text>

            <rect x="170" y="0" width="110" height="30" rx="15" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
            <text x="225" y="20" font-family="Arial, sans-serif" font-size="14" text-anchor="middle"
                fill="white">Android SDK
            </text>

            <rect x="290" y="0" width="140" height="30" rx="15" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
            <text x="360" y="20" font-family="Arial, sans-serif" font-size="14" text-anchor="middle"
                fill="white">Jetpack Compose
            </text>

            <rect x="440" y="0" width="90" height="30" rx="15" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
            <text x="485" y="20" font-family="Arial, sans-serif" font-size="14" text-anchor="middle"
                fill="white">5+ Years
            </text>
        </g>

        <!-- Stats -->
        <g transform="translate(180, 190)">
            <text x="0" y="0" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.9)">🏆 Best Rookie Award 2020
            </text>
            <text x="250" y="0" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.9)">🇰🇷 International Experience
            </text>
            <text x="500" y="0" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.9)">📱 30+ Enterprise Apps
            </text>
        </g>
    </g>

    <!-- Bottom URL -->
    <text x="600" y="580" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="rgba(255,255,255,0.8)">rorpheeyah.github.io
    </text>
</svg>